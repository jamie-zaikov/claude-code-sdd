# SDD CI gate — secret scan (FR-13, FR-16, NFR-3).
#
# One gate per file (design DD-1): this workflow, sdd-review-gate.yml and
# sdd-build-test-lint.yml share the `sdd-` prefix and the identical trigger
# block below so a future sdd-spec-lint.yml drops in by copying the pattern.
#
# This job runs the SHARED scanner (`.github/scripts/sdd-secret-scan.py`, the
# SAME script the pre-push hook runs) over the changed range and fails the
# check when a secret is detected, so CI mirrors the local gate (DD-2, NFR-3).
name: sdd-secret-scan

on:
  pull_request:
    branches: [ main ]          # PR events targeting the protected branch
  push:
    branches-ignore: [ main ]   # pushes to feature branches, for fast feedback

# Least privilege (NFR-1): the scan only needs to read repository content.
permissions:
  contents: read

jobs:
  secret-scan:
    # Job-level name so the emitted check-run context is `sdd-secret-scan`
    # (not the job id `secret-scan`), letting branch protection pin the
    # required check by its documented `sdd-` name.
    name: sdd-secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out with full history
        uses: actions/checkout@v4
        with:
          # Full history so the base/head commits of the changed range are
          # present locally for `git diff` (a shallow clone would miss them).
          fetch-depth: 0

      - name: Scan changed range for secrets
        # Event-payload values are passed through `env:` and referenced as
        # "$VAR" in the script — never interpolated into the shell as
        # ${{ ... }} — so no untrusted payload text is evaluated by the shell
        # (GitHub Actions script-injection hardening).
        #
        # Base/head are resolved to commit SHAs (from the event payload), which
        # are never option-shaped, and the diff is pre-computed here and handed
        # to the scanner via --diff-file. The scanner therefore never forwards
        # any untrusted ref into its internal `git diff`, closing the
        # argument-injection path noted for sdd-secret-scan.py.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          ZERO=0000000000000000000000000000000000000000

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE="$PR_BASE_SHA"
            HEAD="$PR_HEAD_SHA"
          else
            BASE="$PUSH_BEFORE"
            HEAD="$PUSH_AFTER"
          fi

          # Nothing to scan (e.g. a branch deletion push has an all-zero head).
          if [ -z "$HEAD" ] || [ "$HEAD" = "$ZERO" ]; then
            echo "::notice::No head commit to scan; skipping secret scan."
            exit 0
          fi

          # New branch / unknown base: diff against the empty tree so the whole
          # branch content is scanned. The empty-tree object id is derived here
          # so it is correct for both sha1 and sha256 repositories.
          if [ -z "$BASE" ] || [ "$BASE" = "$ZERO" ]; then
            BASE="$(git hash-object -t tree /dev/null)"
          fi

          DIFF_FILE="$RUNNER_TEMP/sdd-secret-scan.diff"
          # BASE and HEAD are resolved commit SHAs (or the empty-tree id): safe
          # to pass to git diff — they cannot be interpreted as options.
          git diff "$BASE" "$HEAD" > "$DIFF_FILE"

          # Scanner exit codes: 0 clean, 1 secret detected, 2 usage/git error.
          # 1 and 2 both fail the step (set -e), failing the required check.
          python3 .github/scripts/sdd-secret-scan.py --diff-file "$DIFF_FILE"
